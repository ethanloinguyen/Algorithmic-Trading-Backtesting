<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lead-Lag Network Analytics Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/react-force-graph-2d@1.25.7/dist/react-force-graph-2d.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://d3js.org/d3.v7.min.js"></script> 
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900 p-4 md:p-10">
    <div id="root" class="max-w-7xl mx-auto space-y-6"></div>

    <script type="text/babel">
        const ForceGraph2D = window.ForceGraph2D;
        const { useState, useMemo, useRef, useEffect, useCallback } = React;

        // --- SYNTHETIC DATA & MAPPING ---
        const TechColor = '#6366f1'; 
        const FinanceColor = '#10b981'; 
        const DimColor = 'rgba(100, 116, 139, 0.2)'; 

        const MOCK_NODES = [
            { id: 'MSFT', sector: 'Tech', centrality: 98, outDegree: 24 },
            { id: 'AAPL', sector: 'Tech', centrality: 85, outDegree: 18 },
            { id: 'NVDA', sector: 'Tech', centrality: 92, outDegree: 20 },
            { id: 'INTC', sector: 'Tech', centrality: 45, outDegree: 5 },
            { id: 'CSCO', sector: 'Tech', centrality: 50, outDegree: 7 },
            { id: 'JPM',  sector: 'Finance', centrality: 88, outDegree: 16 },
            { id: 'GS',   sector: 'Finance', centrality: 75, outDegree: 12 },
            { id: 'V',    sector: 'Finance', centrality: 82, outDegree: 15 },
            { id: 'MA',   sector: 'Finance', centrality: 80, outDegree: 14 }
        ];

        const MOCK_EDGES = [
            { source: 'MSFT', target: 'AAPL', weight: 0.85 },
            { source: 'MSFT', target: 'NVDA', weight: 0.70 },
            { source: 'MSFT', target: 'INTC', weight: 0.95 },
            { source: 'MSFT', target: 'CSCO', weight: 0.76 },
            { source: 'NVDA', target: 'AAPL', weight: 0.65 },
            { source: 'JPM',  target: 'GS',   weight: 0.90 },
            { source: 'V',    target: 'JPM',  weight: 0.55 },
            { source: 'V',    target: 'MA',   weight: 0.88 },
            { source: 'MSFT', target: 'V',    weight: 0.45 }, 
            { source: 'AAPL', target: 'GS',   weight: 0.20 }  
        ];

        function NetworkApp() {
            const [minSignal, setMinSignal] = useState(0.4);
            const [selectedSector, setSelectedSector] = useState("All");
            const [activeNode, setActiveNode] = useState(MOCK_NODES[0]);
            
            // Hover States
            const [hoverNodeId, setHoverNodeId] = useState(null);
            const [hoverLink, setHoverLink] = useState(null);
            
            const fgRef = useRef();
            const containerRef = useRef();
            const [dimensions, setDimensions] = useState({ width: 800, height: 600 });

            // Persistent Nodes & Anchoring
            const [persistentNodes] = useState(() => MOCK_NODES.map(n => {
                const nodeData = { ...n };
                // Anchor the heavyweights in a triangle shape
                if (n.id === 'MSFT') { nodeData.fx = -150; nodeData.fy = -100; }
                if (n.id === 'NVDA') { nodeData.fx = 150; nodeData.fy = -100; }
                if (n.id === 'JPM')  { nodeData.fx = 0; nodeData.fy = 150; }
                return nodeData;
            }));

            useEffect(() => {
                if (containerRef.current) {
                    setDimensions({
                        width: containerRef.current.clientWidth,
                        height: containerRef.current.clientHeight
                    });
                }
            }, []);

            const graphData = useMemo(() => {
                const validNodesList = persistentNodes.filter(n => selectedSector === 'All' || n.sector === selectedSector);
                const validNodeIds = new Set(validNodesList.map(n => n.id));
                
                const validEdges = MOCK_EDGES.filter(e => {
                    const sourceId = typeof e.source === 'object' ? e.source.id : e.source;
                    const targetId = typeof e.target === 'object' ? e.target.id : e.target;
                    return e.weight >= minSignal && validNodeIds.has(sourceId) && validNodeIds.has(targetId);
                });

                return { 
                    nodes: validNodesList, 
                    links: validEdges.map(e => ({...e})) 
                };
            }, [selectedSector, minSignal, persistentNodes]);

            const isNeighbor = useCallback((nodeId) => {
                if (!hoverNodeId) return false;
                return graphData.links.some(l => {
                    const s = typeof l.source === 'object' ? l.source.id : l.source;
                    const t = typeof l.target === 'object' ? l.target.id : l.target;
                    return (s === hoverNodeId && t === nodeId) || (t === hoverNodeId && s === nodeId);
                });
            }, [hoverNodeId, graphData]);

            const activeFollowers = useMemo(() => {
                return MOCK_EDGES.filter(e => {
                    const sourceId = typeof e.source === 'object' ? e.source.id : e.source;
                    return sourceId === activeNode.id && e.weight >= minSignal;
                }).sort((a, b) => b.weight - a.weight);
            }, [activeNode, minSignal]);

            // D3 Physics Engine
            useEffect(() => {
                if (fgRef.current && graphData.nodes.length > 0 && dimensions.width > 0) {
                    const sim = fgRef.current;
                    sim.d3Force('charge').strength(-250);
                    sim.d3Force('link').distance(150);
                    // Collision force using the valid window.d3 object
                    sim.d3Force('collide', window.d3.forceCollide(node => (node.centrality / 16) + 15));
                }
            }, [fgRef, graphData.nodes, dimensions.width]);

            return (
                <div className="grid grid-cols-1 lg:grid-cols-4 gap-6">
                    
                    {/* Left Sidebar */}
                    <div className="space-y-6">
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                            <h2 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4">Network Filters</h2>
                            
                            <div className="space-y-4">
                                <div>
                                    <label className="block text-sm font-bold text-slate-700 mb-2">Sector Focus</label>
                                    <select 
                                        className="w-full p-2 border border-slate-200 rounded-lg text-sm bg-slate-50 focus:outline-none focus:border-indigo-500"
                                        value={selectedSector}
                                        onChange={(e) => setSelectedSector(e.target.value)}
                                    >
                                        <option value="All">Global Market</option>
                                        <option value="Tech">Info Tech Centrality</option>
                                        <option value="Finance">Financial Services Centrality</option>
                                    </select>
                                </div>

                                <div>
                                    <label className="flex justify-between text-sm font-bold text-slate-700 mb-2">
                                        <span>Min Signal Strength</span>
                                        <span className="text-indigo-600 font-mono text-base">{minSignal.toFixed(2)}</span>
                                    </label>
                                    <input 
                                        type="range" 
                                        min="0" max="1" step="0.05" 
                                        value={minSignal}
                                        onChange={(e) => setMinSignal(parseFloat(e.target.value))}
                                        className="w-full accent-indigo-600"
                                    />
                                    <p className="text-[10px] text-slate-400 mt-2">Notice how the core hubs remain perfectly stationary as you filter the noise.</p>
                                </div>
                            </div>
                        </div>

                        {/* Node Inspector */}
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col">
                            <h2 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4">Node Inspector</h2>
                            
                            <div className="flex items-center gap-4 mb-6">
                                <div className={`w-12 h-12 rounded-full flex items-center justify-center font-black text-lg ${activeNode.sector === 'Tech' ? 'bg-indigo-100 text-indigo-700' : 'bg-emerald-100 text-emerald-700'}`}>
                                    {activeNode.id[0]}
                                </div>
                                <div>
                                    <h3 className="text-xl font-black">{activeNode.id}</h3>
                                    <span className="text-xs font-semibold px-2 py-1 bg-slate-100 text-slate-600 rounded-md">{activeNode.sector}</span>
                                </div>
                            </div>

                            <div className="grid grid-cols-2 gap-4 mb-6 text-center">
                                <div className="bg-slate-50 p-3 rounded-xl border border-slate-100">
                                    <div className="text-[10px] font-bold text-slate-400 uppercase">Centrality</div>
                                    <div className="text-xl font-black text-indigo-600">{activeNode.centrality}</div>
                                </div>
                                <div className="bg-slate-50 p-3 rounded-xl border border-slate-100">
                                    <div className="text-[10px] font-bold text-slate-400 uppercase">Lead Potential</div>
                                    <div className="text-xl font-black text-slate-700">{activeNode.outDegree}</div>
                                </div>
                            </div>

                            <div className="flex-1 space-y-2">
                                <h4 className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 border-b border-slate-100 pb-1">Strongest Leads</h4>
                                <ul className="space-y-2 text-xs font-mono">
                                    {activeFollowers.length === 0 ? (
                                        <li className="text-slate-400 italic">No strong followers detected.</li>
                                    ) : (
                                        activeFollowers.map((edge, idx) => {
                                            const targetId = typeof edge.target === 'object' ? edge.target.id : edge.target;
                                            return (
                                                <li key={idx} className="flex justify-between items-center bg-slate-50 p-1.5 rounded-md border border-slate-100">
                                                    <span className="font-bold text-slate-800">{targetId}</span> 
                                                    <span className="text-green-600 font-medium px-2 py-0.5 rounded bg-green-50">{edge.weight.toFixed(2)} sig</span>
                                                </li>
                                            )
                                        })
                                    )}
                                </ul>
                            </div>
                        </div>
                    </div>

                    {/* Main Graph Area */}
                    <div className="lg:col-span-3 bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col relative overflow-hidden">
                        <div className="flex justify-between items-center mb-4 border-b border-slate-100 pb-4">
                            <div>
                                <h1 className="text-xl font-black tracking-tight">Market Lead-Lag Terminal</h1>
                                <p className="text-slate-400 text-xs mt-0.5 font-bold uppercase">Manual Lead Transmission Testing Mode</p>
                            </div>
                            <div className="flex gap-4 text-xs font-bold text-slate-500 bg-slate-50 p-2.5 rounded-lg border border-slate-100">
                                <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded-full bg-indigo-500"></span> Tech</span>
                                <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded-full bg-emerald-500"></span> Finance</span>
                            </div>
                        </div>
                        
                        <div ref={containerRef} className="flex-1 bg-slate-900 rounded-xl overflow-hidden relative border-4 border-slate-100 min-h-[600px] shadow-inner">
                            {dimensions.width > 0 && (
                                <ForceGraph2D
                                    ref={fgRef}
                                    width={dimensions.width}
                                    height={dimensions.height}
                                    graphData={graphData}
                                    
                                    nodeCanvasObjectMode={() => 'replace'}
                                    nodeCanvasObject={(node, ctx, globalScale) => {
                                        const nodeSize = Math.max(3, node.centrality / 16); 
                                        let nodeColor = node.sector === 'Tech' ? TechColor : FinanceColor;
                                        if (hoverNodeId && hoverNodeId !== node.id && !isNeighbor(node.id)) {
                                            nodeColor = DimColor; 
                                        }
                                        
                                        ctx.beginPath();
                                        ctx.arc(node.x, node.y, nodeSize, 0, 2 * Math.PI, false);
                                        ctx.fillStyle = nodeColor;
                                        ctx.fill();

                                        const label = node.id;
                                        const fontSize = 14 / globalScale; 
                                        
                                        if (globalScale > 0.3) {
                                            ctx.font = `bold ${fontSize}px Sans-Serif`; 
                                            ctx.textAlign = 'center';
                                            ctx.textBaseline = 'middle';
                                            
                                            if (hoverNodeId && hoverNodeId !== node.id && !isNeighbor(node.id)) {
                                                ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
                                            } else {
                                                ctx.fillStyle = 'white';
                                            }
                                            ctx.fillText(label, node.x, node.y);
                                        }
                                    }}
                                    
                                    linkWidth={link => (hoverLink === link ? link.weight * 5 : link.weight * 3)}
                                    linkDirectionalArrowLength={6}
                                    linkDirectionalArrowRelPos={1}
                                    
                                    linkDirectionalParticles={2}
                                    linkDirectionalParticleWidth={2}
                                    linkDirectionalParticleSpeed={link => link.weight * 0.005}
                                    
                                    // Render text directly on hovered links
                                    linkCanvasObjectMode={() => 'after'}
                                    linkCanvasObject={(link, ctx) => {
                                        if (hoverLink === link) {
                                            const start = link.source;
                                            const end = link.target;
                                            if (typeof start !== 'object' || typeof end !== 'object') return;
                                            
                                            const textPos = {
                                                x: start.x + (end.x - start.x) / 2,
                                                y: start.y + (end.y - start.y) / 2
                                            };

                                            ctx.font = 'bold 12px Sans-Serif';
                                            ctx.textAlign = 'center';
                                            ctx.textBaseline = 'middle';
                                            
                                            const label = `Sig: ${link.weight.toFixed(2)}`;
                                            const textWidth = ctx.measureText(label).width;
                                            ctx.fillStyle = 'rgba(15, 23, 42, 0.8)';
                                            ctx.fillRect(textPos.x - (textWidth/2) - 4, textPos.y - 8, textWidth + 8, 16);
                                            
                                            ctx.fillStyle = '#fde047'; 
                                            ctx.fillText(label, textPos.x, textPos.y);
                                        }
                                    }}

                                    linkColor={link => {
                                        if (hoverLink === link) return '#fde047';

                                        const sId = typeof link.source === 'object' ? link.source.id : link.source;
                                        const tId = typeof link.target === 'object' ? link.target.id : link.target;
                                        
                                        if (!hoverNodeId) return `rgba(148, 163, 184, ${link.weight * 0.6})`;
                                        
                                        if (sId === hoverNodeId) return `rgba(34, 197, 94, 0.9)`;
                                        if (tId === hoverNodeId) return `rgba(239, 68, 68, 0.9)`;
                                        
                                        return 'rgba(100, 116, 139, 0.1)';
                                    }}

                                    onNodeHover={node => {
                                        document.body.style.cursor = node ? 'pointer' : null;
                                        setHoverNodeId(node ? node.id : null);
                                    }}
                                    onNodeClick={node => setActiveNode(node)}
                                    onNodeDragEnd={node => {
                                        node.fx = node.x;
                                        node.fy = node.y;
                                    }}
                                    onLinkHover={link => {
                                        document.body.style.cursor = link ? 'pointer' : null;
                                        setHoverLink(link);
                                    }}
                                    
                                    d3VelocityDecay={0.3}
                                />
                            )}
                        </div>
                    </div>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<NetworkApp />);
    </script>
</body>
</html>
