# ============================================================
# QUANT LEAD-LAG PIPELINE — SECTOR PAIRS CONFIGURATION
# ============================================================
# Identical to config.yaml except output table names are prefixed
# with "sector_" so this pipeline runs entirely in isolation from
# the full cross-universe analysis.
#
# Shared inputs (rolling_residuals, market_data, ticker_metadata,
# ff_factors, filtered_universe) point to the same tables so
# residuals don't need to be recomputed.

# ── Universe ─────────────────────────────────────────────────
universe:
  start_date: "2010-01-01"
  end_date: "2025-12-31"
  min_continuous_years: 2
  min_trading_day_coverage: 0.95
  min_median_dollar_volume: 5_000_000
  min_market_cap: 300_000_000

# ── Rolling Window ────────────────────────────────────────────
windows:
  window_days: 252
  step_days: 63
  min_obs_for_dcor: 100

# ── Residualization ───────────────────────────────────────────
residuals:
  factor_model: "3factor"
  ff_cache_path: "capstone-bucket-487001"

# ── Lags ─────────────────────────────────────────────────────
lags:
  lag_list: [1, 2, 3, 4, 5]

# ── Permutation Testing ───────────────────────────────────────
permutation:
  tier1_n: 100
  tier1_cutoff: 0.20
  tier2_n: 500
  tier2_cutoff: 0.10
  tier3_n: 1000
  block_size: 5
  tier0_dcor_threshold: 0.05
  max_tier3_fraction: 0.10

# ── FDR Control ───────────────────────────────────────────────
fdr:
  alpha: 0.05

# ── Trading Strategy ──────────────────────────────────────────
strategy:
  zscore_lookback_days: 60
  zscore_threshold: 1.0
  hold_days: 1
  transaction_cost_bps: 10

# ── OOS Validation ────────────────────────────────────────────
oos:
  primary_metric: "net_sharpe"
  secondary_metric: "oos_dcor"
  annualization_factor: 252
  risk_free_rate: 0.0
  sharpe_winsorize_pct: [5, 95]
  rolling_val_train_years: 1
  rolling_val_test_months: 3
  long_val_train_years: 5
  long_val_test_years: 1

# ── β Weight Refit Schedule ───────────────────────────────────
model:
  refit_schedule: "quarterly"
  refit_months: [1, 4, 7, 10]
  bootstrap_n: 1000
  stability_features: ["mean_dcor", "variance_dcor", "frequency", "half_life", "sharpness"]

# ── Half-Life Estimation ──────────────────────────────────────
half_life:
  min_r2_for_stable: 0.30
  max_half_life_days: 252

# ── Sharpness ────────────────────────────────────────────────
sharpness:
  method: "entropy"

# ── Monte Carlo ───────────────────────────────────────────────
monte_carlo:
  n_simulations: 1000
  block_size: 21
  confidence_levels: [0.05, 0.25, 0.75, 0.95]

# ── Synthetic Health Check ────────────────────────────────────
synthetic:
  enabled: true
  random_seed: 42
  n_planted_pairs: 50
  n_null_pairs: 450
  planted_lag: 2
  planted_noise_std: 1.0
  volatility_clustering: true
  permutation_n: 200
  min_tpr: 0.70
  max_fpr: 0.10

# ── Cloud Run / Compute ───────────────────────────────────────
compute:
  partition_count: 50
  max_cloud_run_cpu_hours: 20
  cloud_run_memory: "4Gi"
  cloud_run_cpu: 2
  cloud_run_timeout: 3600

# ── GCP Infrastructure ────────────────────────────────────────
gcp:
  project_id: "capstone-487001"
  region: "us-central1"
  bq_dataset: "output_results"
  source_dataset: "yfinance_stocks_data"
  gcs_bucket: "capstone-bucket-487001"
  pubsub_topic: "pipeline-trigger"
  cloud_run_service_account: "jt-capstone@capstone-487001.iam.gserviceaccount.com"

# ── BigQuery Table Names ──────────────────────────────────────
# Input tables (shared with the full pipeline — not renamed):
#   rolling_residuals, market_data, ticker_metadata, ff_factors,
#   filtered_universe
# Output tables (sector-specific — all prefixed with "sector_"):
tables:
  market_data: "market_data"
  ticker_metadata: "ticker_metadata"
  ff_factors: "ff_factors"
  filtered_universe: "filtered_universe"
  rolling_residuals: "sector_rolling_residuals"   # sector-augmented residuals (FF + sector factor)
  pair_results_raw: "sector_pair_results_raw"
  pair_results_filtered: "sector_pair_results_filtered"
  stability_metrics: "sector_stability_metrics"
  oos_strategy_returns: "sector_oos_strategy_returns"
  model_weights: "sector_model_weights"
  final_network: "sector_final_network"
  synthetic_health_log: "sector_synthetic_health_log"
  pipeline_run_log: "sector_pipeline_run_log"

# ── API ───────────────────────────────────────────────────────
api:
  default_top_n: 100
  max_top_n: 1000
  cache_ttl_seconds: 3600